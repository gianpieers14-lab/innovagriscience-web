media:
  input: images
  output: /images

content:
  - name: galeria
    label: "Galería"
    type: file
    path: content/galeria.json
    fields:
      - name: bloques
        label: "Especies"
        type: object
        list: true
        fields:
          - name: especie
            label: "Especie (nombre científico)"
            type: string
          - name: comun
            label: "Nombre común"
            type: string
          - name: fotos
            label: "Fotografías"
            type: object
            list: true
            fields:
              - name: imagen
                label: "Imagen"
                type: image
              - name: titulo
                label: "Título"
                type: string
              - name: descripcion
                label: "Descripción"
                type: text
