media:
  input: images
  output: /images

content:
  - name: galeria
    label: "Galería"
    type: file
    path: content/galeria.json
    fields:
      - name: bloques
        label: "Especies"
        type: object
        list: true
        fields:
          - name: especie
            label: "Especie (nombre científico)"
            type: string
          - name: comun
            label: "Nombre común"
            type: string
          - name: fotos
            label: "Fotografías"
            type: object
            list: true
            fields:
              - name: imagen
                label: "Imagen"
                type: image
              - name: titulo
                label: "Título"
                type: string
              - name: descripcion
                label: "Descripción"
                type: text

  - name: novedades
    label: "Novedades (Blog)"
    type: file
    path: content/blog.json
    fields:
      - name: mostrar
        label: "Mostrar en la web (encender / apagar)"
        type: boolean
      - name: titulo_seccion
        label: "Título de la sección"
        type: string
      - name: intro
        label: "Texto introductorio"
        type: text
      - name: posts
        label: "Publicaciones"
        type: object
        list: true
        fields:
          - name: titulo
            label: "Título"
            type: string
          - name: fecha
            label: "Fecha"
            type: string
          - name: imagen
            label: "Imagen de portada"
            type: image
          - name: resumen
            label: "Resumen (sinopsis corta)"
            type: text
          - name: contenido
            label: "Contenido completo (se abre al hacer clic)"
            type: rich-text
          - name: pdf
            label: "Archivo PDF (opcional)"
            type: file
